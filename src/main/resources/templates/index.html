<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>登录 - 教育大模型对战评测平台</title>
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<link href="https://cdn.bootcdn.net/ajax/libs/bootstrap/5.3.0/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.bootcdn.net/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
<style>
:root {
  --navy: #0f172a;
  --navy-mid: #1e293b;
  --navy-light: #334155;
  --blue: #3b82f6;
  --blue-light: #60a5fa;
  --blue-pale: #dbeafe;
  --cyan: #06b6d4;
  --amber: #f59e0b;
  --red: #ef4444;
  --green: #10b981;
  --cream: #f8fafc;
  --white: #ffffff;
  --text-dark: #0f172a;
  --text-mid: #475569;
  --text-light: #94a3b8;
  --border: #e2e8f0;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Noto Sans SC', -apple-system, sans-serif;
  background: var(--cream);
  color: var(--text-dark);
}
.login-page {
  min-height: 100vh;
  display: flex;
  background: linear-gradient(135deg, #0f172a 0%, #1e293b 50%, #0f172a 100%);
  position: relative; overflow: hidden;
}
.login-page::before {
  content: ''; position: absolute; top: -50%; left: -50%;
  width: 200%; height: 200%;
  background: radial-gradient(circle at 30% 40%, rgba(59,130,246,.08) 0%, transparent 50%),
              radial-gradient(circle at 70% 60%, rgba(6,182,212,.06) 0%, transparent 50%);
  animation: bgFloat 20s ease-in-out infinite;
}
@keyframes bgFloat {
  0%,100% { transform: translate(0,0); }
  50% { transform: translate(-2%,-2%); }
}
.login-left {
  flex: 1; display: flex; flex-direction: column;
  justify-content: center; padding: 60px;
  position: relative; z-index: 1;
}
.login-left h1 {
  font-size: 42px; font-weight: 700; color: #fff;
  line-height: 1.3; margin-bottom: 16px;
}
.login-left h1 span {
  background: linear-gradient(135deg, var(--blue-light), var(--cyan));
  -webkit-background-clip: text;
  background-clip: text;
  -webkit-text-fill-color: transparent;
}
.login-left p { color: rgba(255,255,255,.5); font-size: 16px; line-height: 1.8; max-width: 480px; }
.feature-list { margin-top: 40px; }
.feature-item {
  display: flex; align-items: center; gap: 14px;
  margin-bottom: 16px; color: rgba(255,255,255,.6);
  font-size: 14px;
}
.feature-dot {
  width: 8px; height: 8px; border-radius: 50%;
  background: linear-gradient(135deg, var(--blue), var(--cyan));
  flex-shrink: 0;
}
.login-right {
  width: 480px; display: flex; align-items: center;
  justify-content: center; padding: 40px;
  position: relative; z-index: 1;
}
.login-box {
  width: 100%; max-width: 400px;
  background: rgba(255,255,255,.03);
  backdrop-filter: blur(20px);
  border: 1px solid rgba(255,255,255,.08);
  border-radius: 20px; padding: 40px;
}
.login-box h2 { color: #fff; font-size: 22px; font-weight: 700; margin-bottom: 6px; }
.login-box .sub { color: rgba(255,255,255,.4); font-size: 13px; margin-bottom: 28px; }
.login-box .form-label { color: rgba(255,255,255,.6); }
.login-box .form-control {
  background: rgba(255,255,255,.05); border-color: rgba(255,255,255,.1);
  color: #fff;
}
.login-box .form-control::placeholder { color: rgba(255,255,255,.25); }
.login-box .form-control:focus {
  background: rgba(255,255,255,.08);
  border-color: var(--blue); box-shadow: 0 0 0 3px rgba(59,130,246,.15);
  color: #fff;
}
.tab-btns { display: flex; gap: 8px; margin-bottom: 28px; }
.tab-btn {
  flex: 1; padding: 10px; border-radius: 10px; border: none;
  font-size: 14px; font-weight: 500; cursor: pointer;
  background: rgba(255,255,255,.05); color: rgba(255,255,255,.4);
  transition: all .2s;
}
.tab-btn.active {
  background: linear-gradient(135deg, var(--blue), #2563eb);
  color: #fff;
}
.submit-btn {
  width: 100%; padding: 12px; border: none; border-radius: 10px;
  background: linear-gradient(135deg, var(--blue), #2563eb);
  color: #fff; font-size: 15px; font-weight: 600;
  cursor: pointer; transition: all .2s; margin-top: 8px;
}
.submit-btn:hover { transform: translateY(-1px); box-shadow: 0 8px 20px rgba(59,130,246,.3); }
.submit-btn:disabled { opacity: .5; cursor: not-allowed; transform: none; }
@media (max-width: 768px) {
  .login-page { flex-direction: column; }
  .login-left { padding: 40px 24px; }
  .login-left h1 { font-size: 28px; }
  .login-right { width: 100%; padding: 0 24px 40px; }
}
.toast-msg {
  background: var(--navy); color: #fff;
  padding: 12px 20px; border-radius: 10px;
  font-size: 13px; margin-top: 8px;
  opacity: 0; transform: translateY(10px);
  animation: toastIn .3s forwards, toastOut .3s 2.5s forwards;
  box-shadow: 0 8px 24px rgba(0,0,0,.2);
}
.toast-msg.error { background: var(--red); }
.toast-msg.success { background: var(--green); }
@keyframes toastIn { to { opacity:1; transform:none } }
@keyframes toastOut { to { opacity:0; transform:translateY(10px) } }
</style>
</head>
<body>

<div class="login-page">
  <div class="login-left">
    <h1>教育大模型<br><span>众包式对战评测平台</span></h1>
    <p>面向作文批改场景，通过匿名 A/B 对战与教师投票，构建高质量的教育大模型人类偏好数据集。</p>
    <div class="feature-list">
      <div class="feature-item"><div class="feature-dot"></div>多模型匿名盲测对战</div>
      <div class="feature-item"><div class="feature-dot"></div>教师偏好投票采集</div>
      <div class="feature-item"><div class="feature-dot"></div>Elo 动态实时排名</div>
      <div class="feature-item"><div class="feature-dot"></div>智能匹配与新模型快速定位</div>
      <div class="feature-item"><div class="feature-dot"></div>标准化偏好数据集导出</div>
    </div>
  </div>
  <div class="login-right">
    <div class="login-box">
      <h2 id="formTitle">欢迎回来</h2>
      <p class="sub" id="formSub">请登录以开始评测</p>

      <div class="tab-btns">
        <button class="tab-btn active" onclick="switchTab('login')">登录</button>
        <button class="tab-btn" onclick="switchTab('register')">注册</button>
      </div>

      <div id="loginForm">
        <div class="mb-3">
          <label class="form-label">用户名</label>
          <input type="text" class="form-control" id="loginUser" placeholder="请输入用户名">
        </div>
        <div class="mb-3">
          <label class="form-label">密码</label>
          <input type="password" class="form-control" id="loginPass" placeholder="请输入密码"
                 onkeypress="if(event.key==='Enter')doLogin()">
        </div>
        <button class="submit-btn" onclick="doLogin()">
          <i class="fa fa-sign-in me-2"></i>登录
        </button>
      </div>

      <div id="registerForm" style="display:none">
        <div class="mb-3">
          <label class="form-label">用户名</label>
          <input type="text" class="form-control" id="regUser" placeholder="请输入用户名">
        </div>
        <div class="mb-3">
          <label class="form-label">显示名称</label>
          <input type="text" class="form-control" id="regName" placeholder="例：张老师">
        </div>
        <div class="mb-3">
          <label class="form-label">密码</label>
          <input type="password" class="form-control" id="regPass" placeholder="至少6位密码">
        </div>
        <div class="mb-3">
          <label class="form-label">确认密码</label>
          <input type="password" class="form-control" id="regPass2" placeholder="再次输入密码"
                 onkeypress="if(event.key==='Enter')doRegister()">
        </div>
        <button class="submit-btn" onclick="doRegister()">
          <i class="fa fa-user-plus me-2"></i>注册
        </button>
      </div>
    </div>
  </div>
</div>

<div id="toast-container" style="position:fixed;bottom:24px;right:24px;z-index:9999;"></div>
<script>
function showToast(msg, type='') {
  const c = document.getElementById('toast-container');
  const d = document.createElement('div');
  d.className = 'toast-msg ' + type;
  d.textContent = msg;
  c.appendChild(d);
  setTimeout(() => d.remove(), 3000);
}

function switchTab(tab) {
  document.querySelectorAll('.tab-btn').forEach((b,i) => {
    b.classList.toggle('active', (tab==='login' && i===0) || (tab==='register' && i===1));
  });
  document.getElementById('loginForm').style.display = tab==='login' ? '' : 'none';
  document.getElementById('registerForm').style.display = tab==='register' ? '' : 'none';
  document.getElementById('formTitle').textContent = tab==='login' ? '欢迎回来' : '创建账号';
  document.getElementById('formSub').textContent = tab==='login' ? '请登录以开始评测' : '注册新的教师账号';
}

async function doLogin() {
  const username = document.getElementById('loginUser').value.trim();
  const password = document.getElementById('loginPass').value;
  if (!username || !password) { showToast('请填写用户名和密码', 'error'); return; }
  try {
    const r = await fetch('/api/login', {
      method: 'POST', headers: {'Content-Type':'application/json'},
      body: JSON.stringify({username, password})
    });
    const d = await r.json();
    if (d.code !== 200) { showToast(d.message, 'error'); return; }
    // 保存token到localStorage
    if (d.data && d.data.token) {
      localStorage.setItem('token', d.data.token);
      localStorage.setItem('userRole', d.data.role || 'teacher');
      localStorage.setItem('displayName', d.data.display_name || username);
    }
    showToast('登录成功！', 'success');
    setTimeout(() => location.href = '/battle', 500);
  } catch(e) { showToast('网络错误', 'error'); }
}

async function doRegister() {
  const username = document.getElementById('regUser').value.trim();
  const display_name = document.getElementById('regName').value.trim();
  const password = document.getElementById('regPass').value;
  const password2 = document.getElementById('regPass2').value;
  if (!username || !password) { showToast('请填写用户名和密码', 'error'); return; }
  if (password !== password2) { showToast('两次密码不一致', 'error'); return; }
  try {
    const r = await fetch('/api/register', {
      method: 'POST', headers: {'Content-Type':'application/json'},
      body: JSON.stringify({username, password, display_name: display_name || username})
    });
    const d = await r.json();
    if (d.code !== 200) { showToast(d.message, 'error'); return; }
    showToast('注册成功，请登录！', 'success');
    switchTab('login');
    document.getElementById('loginUser').value = username;
  } catch(e) { showToast('网络错误', 'error'); }
}
</script>
</body>
</html>
